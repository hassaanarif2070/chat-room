<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatVibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ChatVibe</h1>
            <p class="subtitle">Messages are stored in server memory.</p>
        </header>

        <main class="chat-window" id="chat-window">
            <div id="messages-list">
                <!-- Messages will be injected here by JS -->
                <div class="system-message">Welcome to the chat room!</div>
            </div>
        </main>

        <footer class="input-area">
            <input type="text" id="username-input" placeholder="Your Name" maxlength="20" autocomplete="off">
            <div class="message-input-group">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
